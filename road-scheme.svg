<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="100%" height="100%">
  <defs>
    <!-- Текстура асфальта -->
    <pattern id="asphalt-texture" patternUnits="userSpaceOnUse" width="8" height="8">
      <rect width="8" height="8" fill="#3a3a3a"/>
      <circle cx="2" cy="2" r="0.8" fill="#444" opacity="0.6"/>
      <circle cx="6" cy="5" r="0.6" fill="#2e2e2e" opacity="0.4"/>
      <circle cx="4" cy="7" r="0.7" fill="#4a4a4a" opacity="0.3"/>
      <circle cx="7" cy="1" r="0.5" fill="#333" opacity="0.5"/>
    </pattern>
    
    <!-- Текстура щебня -->
    <pattern id="gravel-texture" patternUnits="userSpaceOnUse" width="20" height="16">
      <rect width="20" height="16" fill="#5c4a3a"/>
      <polygon points="3,2 8,1 10,6 5,8 1,5" fill="#7a6350" opacity="0.9"/>
      <polygon points="13,4 18,3 19,9 14,11 11,7" fill="#6b5640" opacity="0.8"/>
      <polygon points="1,10 6,9 8,14 3,15" fill="#8a7060" opacity="0.7"/>
      <polygon points="11,11 16,10 18,15 13,16" fill="#5e4838" opacity="0.9"/>
      <polygon points="7,3 11,2 12,5" fill="#7d6550" opacity="0.6"/>
      <circle cx="4" cy="7" r="1.5" fill="#4a3828" opacity="0.5"/>
      <circle cx="15" cy="13" r="1.2" fill="#6b5540" opacity="0.4"/>
    </pattern>
    
    <!-- Текстура песка -->
    <pattern id="sand-texture" patternUnits="userSpaceOnUse" width="6" height="6">
      <rect width="6" height="6" fill="#c4a040"/>
      <circle cx="1" cy="1" r="0.6" fill="#d4b050" opacity="0.7"/>
      <circle cx="4" cy="3" r="0.5" fill="#b89030" opacity="0.6"/>
      <circle cx="2" cy="5" r="0.7" fill="#d4b858" opacity="0.5"/>
      <circle cx="5" cy="1" r="0.4" fill="#a88020" opacity="0.4"/>
      <circle cx="3" cy="4" r="0.5" fill="#c8a848" opacity="0.5"/>
    </pattern>
    
    <!-- Текстура грунта -->
    <pattern id="soil-texture" patternUnits="userSpaceOnUse" width="12" height="10">
      <rect width="12" height="10" fill="#5c4030"/>
      <circle cx="3" cy="3" r="1.2" fill="#4a3020" opacity="0.5"/>
      <circle cx="8" cy="6" r="1.5" fill="#6b4a35" opacity="0.4"/>
      <circle cx="10" cy="2" r="0.8" fill="#3d2818" opacity="0.6"/>
      <circle cx="5" cy="8" r="1" fill="#553525" opacity="0.5"/>
      <ellipse cx="2" cy="7" rx="2" ry="1" fill="#4d3525" opacity="0.3"/>
    </pattern>
    
    <!-- Градиент для выделения активного слоя -->
    <linearGradient id="active-glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0"/>
      <stop offset="50%" stop-color="#f97316" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </linearGradient>
    
    <!-- Тень -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>
  
  <!-- Фон -->
  <rect width="500" height="400" fill="#0a0a0a" rx="12"/>
  
  <g filter="url(#shadow)">
    <!-- Слой 4: Асфальт -->
    <g id="layer-asphalt" class="road-layer" cursor="pointer">
      <rect x="40" y="60" width="420" height="55" rx="4" fill="url(#asphalt-texture)" stroke="#555" stroke-width="1.5"/>
      <rect x="40" y="60" width="420" height="55" rx="4" fill="none" stroke="transparent" stroke-width="3" id="asphalt-border"/>
      <!-- Дорожная разметка -->
      <line x1="250" y1="60" x2="250" y2="115" stroke="#f97316" stroke-width="2" stroke-dasharray="12 8" opacity="0.8"/>
      <!-- Подпись -->
      <text x="460" y="92" text-anchor="end" fill="white" font-family="Inter, sans-serif" font-size="14" font-weight="700">АСФАЛЬТ</text>
      <text x="460" y="108" text-anchor="end" fill="#ccc" font-family="Inter, sans-serif" font-size="12" font-weight="600">5 см</text>
    </g>
    
    <!-- Слой 3: Щебень -->
    <g id="layer-gravel" class="road-layer" cursor="pointer">
      <rect x="40" y="115" width="420" height="90" rx="0" fill="url(#gravel-texture)" stroke="#4a3828" stroke-width="1"/>
      <rect x="40" y="115" width="420" height="90" rx="0" fill="none" stroke="transparent" stroke-width="3" id="gravel-border"/>
      <text x="460" y="155" text-anchor="end" fill="white" font-family="Inter, sans-serif" font-size="14" font-weight="700">ҚИЫРШЫҚ ТАС</text>
      <text x="460" y="171" text-anchor="end" fill="#ccc" font-family="Inter, sans-serif" font-size="12" font-weight="600">25 см</text>
    </g>
    
    <!-- Слой 2: Песок -->
    <g id="layer-sand" class="road-layer" cursor="pointer">
      <rect x="40" y="205" width="420" height="85" rx="0" fill="url(#sand-texture)" stroke="#a08030" stroke-width="1"/>
      <rect x="40" y="205" width="420" height="85" rx="0" fill="none" stroke="transparent" stroke-width="3" id="sand-border"/>
      <text x="460" y="242" text-anchor="end" fill="white" font-family="Inter, sans-serif" font-size="14" font-weight="700">ҚҰМ</text>
      <text x="460" y="258" text-anchor="end" fill="#ccc" font-family="Inter, sans-serif" font-size="12" font-weight="600">30 см</text>
    </g>
    
    <!-- Слой 1: Грунт -->
    <g id="layer-soil" class="road-layer" cursor="pointer">
      <rect x="40" y="290" width="420" height="70" rx="4" fill="url(#soil-texture)" stroke="#3d2818" stroke-width="1"/>
      <rect x="40" y="290" width="420" height="70" rx="4" fill="none" stroke="transparent" stroke-width="3" id="soil-border"/>
      <text x="460" y="322" text-anchor="end" fill="white" font-family="Inter, sans-serif" font-size="14" font-weight="700">ТОПЫРАҚ</text>
      <text x="460" y="338" text-anchor="end" fill="#ccc" font-family="Inter, sans-serif" font-size="12" font-weight="600">негіз</text>
    </g>
  </g>
</svg>